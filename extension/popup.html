<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: Arial, sans-serif;
      background: #0f1a0f;
      color: #f0fdf4;
    }
    h2 {
      font-size: 18px;
      color: #16a34a;
      margin-top: 0;
    }
    p {
      font-size: 14px;
      color: #86efac;
    }
    .config-section {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #1a2e1a;
    }
    .config-section h3 {
      font-size: 14px;
      color: #16a34a;
      margin: 0 0 10px 0;
    }
    .form-group {
      margin-bottom: 10px;
    }
    .form-group label {
      display: block;
      font-size: 11px;
      color: #86efac;
      margin-bottom: 4px;
    }
    .form-group input {
      width: 100%;
      padding: 8px;
      border: 1px solid #1a2e1a;
      border-radius: 4px;
      background: #1a2e1a;
      color: #f0fdf4;
      font-size: 12px;
      box-sizing: border-box;
    }
    .form-group input:focus {
      outline: none;
      border-color: #16a34a;
    }
    .btn {
      width: 100%;
      padding: 10px;
      background: #16a34a;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      margin-top: 10px;
    }
    .btn:hover {
      background: #15803d;
    }
    .status {
      font-size: 11px;
      margin-top: 10px;
      padding: 8px;
      border-radius: 4px;
      display: none;
    }
    .status.success {
      background: #14532d;
      color: #86efac;
      display: block;
    }
    .status.error {
      background: #450a0a;
      color: #fca5a5;
      display: block;
    }
    .footer {
      font-size: 10px;
      color: #4b5563;
      margin-top: 20px;
      text-align: center;
    }
    a {
      color: #16a34a;
    }
  </style>
</head>
<body>
  <h2>Shift - Eco LLM</h2>
  <p>Track the environmental impact of your LLM prompts.</p>
  <p>Visit <a href="https://gemini.google.com" target="_blank">Gemini</a> to see it in action.</p>

  <div class="config-section">
    <h3>Upstash Vector Config</h3>
    <div class="form-group">
      <label>Vector URL</label>
      <input type="text" id="vectorUrl" placeholder="https://your-vector.upstash.io">
    </div>
    <div class="form-group">
      <label>Vector Token</label>
      <input type="password" id="vectorToken" placeholder="Your Upstash Vector token">
    </div>
    <button class="btn" id="saveConfig">Save Configuration</button>
    <div class="status" id="status"></div>
  </div>

  <div class="footer">Powered by EcoLogits.ai</div>

  <script>
    // Load saved config
    chrome.storage.sync.get(["UPSTASH_VECTOR_URL", "UPSTASH_VECTOR_TOKEN"], (result) => {
      if (result.UPSTASH_VECTOR_URL) {
        document.getElementById("vectorUrl").value = result.UPSTASH_VECTOR_URL;
      }
      if (result.UPSTASH_VECTOR_TOKEN) {
        document.getElementById("vectorToken").value = result.UPSTASH_VECTOR_TOKEN;
      }
    });

    // Save config
    document.getElementById("saveConfig").addEventListener("click", () => {
      const url = document.getElementById("vectorUrl").value.trim();
      const token = document.getElementById("vectorToken").value.trim();
      const status = document.getElementById("status");

      if (!url || !token) {
        status.textContent = "Please fill in both fields";
        status.className = "status error";
        return;
      }

      chrome.storage.sync.set({
        UPSTASH_VECTOR_URL: url,
        UPSTASH_VECTOR_TOKEN: token
      }, () => {
        status.textContent = "Configuration saved successfully!";
        status.className = "status success";
        setTimeout(() => {
          status.className = "status";
        }, 3000);
      });
    });
  </script>
</body>
</html>
