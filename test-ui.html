<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Context-Aware AI Sustainability UI</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; background: #f0f2f5; }
        .container { max-width: 600px; margin: auto; border: 1px solid #ccc; padding: 25px; border-radius: 12px; background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        label { font-weight: bold; display: block; margin-top: 15px; color: #444; }
        input, select, button, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; }
        textarea { height: 60px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 20px; }
        button:hover { background: #0056b3; }
        #status-box { display:none; padding: 15px; margin-top: 20px; border-radius: 6px; font-weight: bold; text-align: center; }
        #result { background: #1e1e1e; color: #d4d4d4; padding: 15px; border-radius: 6px; margin-top: 15px; white-space: pre-wrap; font-family: 'Consolas', monospace; font-size: 13px; border-left: 5px solid #007bff; }
        .hint { font-size: 12px; color: #666; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="color: #28a745; margin-top: 0;">Eco-AI Contextual Tracker</h2>
        <p>Demonstrate how conversational memory saves carbon.</p>
        
        <label>Conversation ID:</label>
        <input type="text" id="convoId" value="session-123">
        <span class="hint">Use same ID to simulate a chat history.</span>

        <label>Prompt:</label>
        <textarea id="prompt" placeholder="e.g., What is the capital of France?"></textarea>

        <label>AI's Response (to store in cache):</label>
        <textarea id="aiResponse" placeholder="e.g., The capital of France is Paris."></textarea>

        <label>Model:</label>
        <select id="model">
            <option value="gpt-4o">GPT-4o</option>
            <option value="gemini-pro">Gemini Pro</option>
        </select>
        
        <label>Tokens:</label>
        <input type="number" id="tokens" value="1000">
        
        <button onclick="sendRequest()">Send Prompt</button>
        
        <div id="status-box"></div>
        <div id="result">Waiting for input...</div>
    </div>

    <script>
        async function sendRequest() {
            const resultDiv = document.getElementById('result');
            const statusBox = document.getElementById('status-box');
            resultDiv.innerText = "Analyzing Context...";
            statusBox.style.display = "none";
            
            try {
                const response = await fetch('http://localhost:3000/calculate-cost', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        conversationId: document.getElementById('convoId').value,
                        prompt: document.getElementById('prompt').value,
                        aiResponse: document.getElementById('aiResponse').value,
                        model: document.getElementById('model').value,
                        tokenCount: parseInt(document.getElementById('tokens').value)
                    })
                });
                
                const data = await response.json();
                
                statusBox.style.display = "block";
                statusBox.innerText = data.message;

                if (data.source.includes("CONTEXT")) {
                    statusBox.style.background = "#d1e7dd";
                    statusBox.style.color = "#0f5132";
                    resultDiv.style.borderLeftColor = "#198754";
                } else {
                    statusBox.style.background = "#fff3cd";
                    statusBox.style.color = "#664d03";
                    resultDiv.style.borderLeftColor = "#ffc107";
                }

                resultDiv.innerText = JSON.stringify(data, null, 2);
            } catch (err) {
                resultDiv.innerText = "Error: " + err.message;
            }
        }
    </script>
</body>
</html>
